server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 220.154.142.131;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/seedance-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seedance
      POSTGRES_USER: seedance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - seedance_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedance -d seedance"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 18081
      DATABASE_URL: postgresql://seedance:${POSTGRES_PASSWORD}@db:5432/seedance
      PROMPT_ENCRYPTION_KEY: ${PROMPT_ENCRYPTION_KEY}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NODE_OPTIONS: --max-old-space-size=768
    ports:
      - "127.0.0.1:${APP_UPSTREAM_PORT:-19405}:18081"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18081/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M

volumes:
  seedance_db:
